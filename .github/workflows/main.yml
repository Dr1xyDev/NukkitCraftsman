name: Build server.jar (NukkitCraftsman)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package --batch-mode -DskipTests  # -DskipTests acelera si hay tests que fallen

      - name: Find the shaded/uber JAR and rename to server.jar
        run: |
          # Busca JARs en target/ que NO sean el original (sin dependencias)
          JAR_FILE=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "original-*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -print | head -n 1)
          
          if [ -z "$JAR_FILE" ]; then
            echo "❌ No se encontró JAR ejecutable en target/. Lista de archivos:"
            ls -la target/
            exit 1
          fi
          
          echo "JAR encontrado: $JAR_FILE"
          cp "$JAR_FILE" target/server.jar
          echo "Copiado/renombrado como target/server.jar"

      - name: Upload server.jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: target/server.jar
          if-no-files-found: error
          retention-days: 7

      - name: Show files in target/ for debug
        if: always()
        run: ls -la target/ || true
